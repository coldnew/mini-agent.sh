name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  bash-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bash syntax check
        run: bash -n mini-agent.sh

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .
          check_together: 'yes'
          ignore_paths: .git
